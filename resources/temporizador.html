<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLL Timer - Pantalla Principal</title>
    <style>
        @font-face {
            font-family: 'Digital7Mono';
            src: url('digital_7_mono.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background-color: #000000;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
            background-image: url('fondo_temporada.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #timerWrapper {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translateX(-50%) translateY(-50%);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border-radius: 12px;
            overflow: visible;
            z-index: 300;
        }

        #timerBgLayer {
            position: absolute;
            inset: -8px -16px;
            border-radius: 14px;
            z-index: 0;
            pointer-events: none;
        }

        .timer {
            font-size: 32vw;
            color: #00ff00;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            text-align: center;
            line-height: 1;
            transition: color 0.3s ease;
            white-space: nowrap;
            position: relative;
            z-index: 1;
            user-select: none;
            cursor: default;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .timer.warning-30 {
            color: #ff8800;
        }

        .timer.warning-10 {
            color: #ff0000;
        }

        .timer.ready {
            color: #ffff00;
        }

        @keyframes oscillate {
            0% {
                transform: translateX(-50%) translateY(-50%);
            }
            25% {
                transform: translateX(calc(-50% + 80px)) translateY(-50%);
            }
            50% {
                transform: translateX(-50%) translateY(-50%);
            }
            75% {
                transform: translateX(calc(-50% - 80px)) translateY(-50%);
            }
            100% {
                transform: translateX(-50%) translateY(-50%);
            }
        }

        #timerWrapper.ending {
            animation: oscillate 1.6s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
        }

        #logosStrip {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            overflow: hidden;
            z-index: 10;
        }

        #logosBgLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #logosRow {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            z-index: 1;
            overflow: hidden;
        }

        #logosTrack {
            display: flex;
            align-items: center;
            height: 100%;
            /* animation se aplica dinámicamente desde JS */
            will-change: transform;
            white-space: nowrap;
        }

        @keyframes logos-marquee {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .logo-slot {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 0 14vw;
        }

        .logo-slot img {
            max-height: 80%;
            max-width: none;
            width: auto;
            height: auto;
            object-fit: contain;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .logo-slot img:not(.disabled):hover {
            opacity: 0.85;
            transform: scale(1.03);
        }

        .logo-slot img.disabled {
            cursor: default;
        }


        .initial-message {
            background-color: #1e3c72;
            color: white;
            padding: 40px 60px;
            border-radius: 15px;
            font-size: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffff00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .initial-message p {
            margin: 0;
            font-weight: bold;
            line-height: 1.5;
        }

        .initial-message small {
            display: block;
            margin-top: 15px;
            font-size: 16px;
            opacity: 0.8;
        }

        .position-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 85%;
            transition: opacity 0.5s ease;
        }

        .position-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .position-message {
            background-color: rgba(30, 60, 114, 0.95);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(255, 255, 255, 0.3);
            max-width: 80%;
            line-height: 1.5;
        }

        .position-message::before {
            content: "💾";
            display: block;
            font-size: 48px;
            margin-bottom: 20px;
        }

        /* Panel ESP32 */
        #esp32Panel {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: none;
            flex-wrap: nowrap;
            gap: 0;
            padding: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 200;
            align-items: stretch;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Columna igual para cada mesa + info de ronda */
        .panel-slot {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            overflow: hidden;
            padding: 0;
            box-sizing: border-box;
            border-right: 1px solid rgba(255,255,255,0.15);
        }
        .panel-slot:last-child { border-right: none; }

        /* Fila de cabecera (nombre de la mesa): altura fija 25% */
        .slot-header {
            height: 25%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.15);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            font-weight: bold;
            letter-spacing: 0.05em;
            padding: 0 6px;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* Cuerpo del slot (nombre del equipo): ocupa el 75% restante */
        .slot-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 2px 6px;
            box-sizing: border-box;
        }

        /* Texto del equipo: permite hasta 3 líneas */
        .slot-team {
            white-space: normal;
            overflow: hidden;
            text-align: center;
            line-height: 1.15;
            font-weight: bold;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            word-break: break-word;
            width: 100%;
        }

        /* Líneas sencillas para el slot de información de ronda */
        .slot-line {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            line-height: 1.2;
            width: 100%;
        }

        /* Colores vivos de estado en slots de mesa */
        .panel-slot-mesa.st-0 { background: rgba(60,60,60,0.55);    color: #ccc; }
        .panel-slot-mesa.st-1 { background: rgba(230,180,0,0.85);   color: #000; }
        .panel-slot-mesa.st-2 { background: rgba(220,100,0,0.85);   color: #fff; }
        .panel-slot-mesa.st-3 { background: rgba(10,170,40,0.90);   color: #fff; }
        .panel-slot-mesa.st-4 { background: rgba(10,80,210,0.90);   color: #fff; }
        .panel-slot-mesa.st-5 { background: rgba(210,20,0,0.90);    color: #fff; }
        .panel-slot-ronda     { background: rgba(0,0,0,0.35);       color: #eee; }

        /* Round info panel inside timer wrapper */
        #roundInfoPanel {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            line-height: 1.3;
            z-index: 1;
            position: relative;
            flex-shrink: 0;
            text-align: center;
            gap: 0.15em;
        }

        #roundInfoPanel .round-line {
            font-weight: bold;
        }

        /* Chroma panel */
        #chromaPanel {
            position: fixed;
            z-index: 150;
            display: none;
        }

        /* Team announce overlay */
        #teamAnnounceOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 500;
            pointer-events: none;
            overflow: visible;
        }

        #teamAnnounceOverlay .announce-text {
            position: absolute;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            font-weight: bold;
            text-align: center;
            paint-order: stroke fill;
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.15;
        }

        #teamAnnounceOverlay .announce-mesa {
            font-size: 0.5em;
            opacity: 0.85;
            display: block;
            margin-bottom: 0.1em;
        }

        /* Animaciones de anuncio de equipo */
        @keyframes announce-fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes announce-zoomIn {
            from { opacity: 0; transform: translateY(-50%) scale(0.3); }
            to   { opacity: 1; transform: translateY(-50%) scale(1); }
        }
        @keyframes announce-zoomOut {
            from { opacity: 0; transform: translateY(-50%) scale(2); }
            to   { opacity: 1; transform: translateY(-50%) scale(1); }
        }
        @keyframes announce-slideLeft {
            from { opacity: 0; transform: translateY(-50%) translateX(-80vw); }
            to   { opacity: 1; transform: translateY(-50%) translateX(0); }
        }
        @keyframes announce-slideRight {
            from { opacity: 0; transform: translateY(-50%) translateX(80vw); }
            to   { opacity: 1; transform: translateY(-50%) translateX(0); }
        }
        @keyframes announce-bounce {
            0%   { opacity: 0; transform: translateY(-50%) scale(0.3); }
            50%  { opacity: 1; transform: translateY(-50%) scale(1.15); }
            70%  { transform: translateY(-50%) scale(0.9); }
            100% { transform: translateY(-50%) scale(1); }
        }
        @keyframes announce-flipX {
            from { opacity: 0; transform: translateY(-50%) perspective(600px) rotateX(90deg); }
            to   { opacity: 1; transform: translateY(-50%) perspective(600px) rotateX(0deg); }
        }
        @keyframes announce-dropIn {
            0%   { opacity: 0; transform: translateY(-150%) scale(1); }
            60%  { opacity: 1; transform: translateY(-40%) scale(1); }
            80%  { transform: translateY(-55%) scale(1); }
            100% { transform: translateY(-50%) scale(1); }
        }
        @keyframes announce-rotateIn {
            from { opacity: 0; transform: translateY(-50%) rotate(-180deg) scale(0.3); }
            to   { opacity: 1; transform: translateY(-50%) rotate(0deg) scale(1); }
        }
        @keyframes announce-slideUp {
            from { opacity: 0; transform: translateY(80vh); }
            to   { opacity: 1; transform: translateY(-50%); }
        }
        @keyframes announce-elastic {
            0%   { opacity: 0; transform: translateY(-50%) scale(0); }
            55%  { opacity: 1; transform: translateY(-50%) scale(1.2); }
            70%  { transform: translateY(-50%) scale(0.85); }
            85%  { transform: translateY(-50%) scale(1.05); }
            100% { transform: translateY(-50%) scale(1); }
        }
        @keyframes announce-flipY {
            from { opacity: 0; transform: translateY(-50%) perspective(600px) rotateY(90deg); }
            to   { opacity: 1; transform: translateY(-50%) perspective(600px) rotateY(0deg); }
        }
        @keyframes announce-expandH {
            from { opacity: 0; transform: translateY(-50%) scaleX(0); }
            to   { opacity: 1; transform: translateY(-50%) scaleX(1); }
        }

        /* Animaciones idle del anuncio (ciclos suaves tras la aparición) */
        @keyframes idle-breathe {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50%       { transform: translateY(-50%) scale(1.035); }
        }
        @keyframes idle-fade {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.65; }
        }
        @keyframes idle-float {
            0%, 100% { transform: translateY(-50%); }
            50%       { transform: translateY(calc(-50% - 8px)); }
        }
        @keyframes idle-sway {
            0%, 100% { transform: translateY(-50%) translateX(0); }
            25%       { transform: translateY(-50%) translateX(7px); }
            75%       { transform: translateY(-50%) translateX(-7px); }
        }
        @keyframes idle-squish {
            0%, 100% { transform: translateY(-50%) scaleX(1) scaleY(1); }
            50%       { transform: translateY(-50%) scaleX(1.04) scaleY(0.97); }
        }
        @keyframes idle-glow {
            0%, 100% { text-shadow: none; }
            50%       { text-shadow: 0 0 18px rgba(255,255,255,0.45), 0 0 36px rgba(255,255,255,0.2); }
        }
        @keyframes idle-letterspace {
            0%, 100% { letter-spacing: normal; }
            50%       { letter-spacing: 0.05em; }
        }

        /* Vertical logos strip */
        #logosVerticalStrip {
            position: fixed;
            left: 0;
            display: none;
            flex-direction: column;
            align-items: stretch;
            justify-content: space-around;
            z-index: 10;
            overflow: hidden;
            box-sizing: border-box;
        }

        #logosVerticalBgLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #logosVerticalTrack {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            z-index: 1;
            padding: 6px 6px;
            box-sizing: border-box;
        }

        .logo-slot-v {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 4px 0;
        }

        .logo-slot-v img {
            max-width: 85%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
        }

    </style>
</head>
<body>
    <div id="esp32Panel"></div>

    <div class="position-overlay" id="positionOverlay">
        <div class="position-message">
            Coloque la ventana en la posición y tamaño para proyectar y haga click para guardar.
        </div>
    </div>

    <div class="container" id="container">
        <div id="timerWrapper">
            <div id="timerBgLayer"></div>
            <div id="roundInfoPanel"></div>
            <div class="timer ready" id="timer">2:30</div>
        </div>
    </div>
    <div id="chromaPanel"></div>
    <div id="teamAnnounceOverlay"></div>
    <div id="logosVerticalStrip">
        <div id="logosVerticalBgLayer"></div>
        <div id="logosVerticalTrack"></div>
    </div>
    <div id="logosStrip" style="display:none;">
        <div id="logosBgLayer"></div>
        <div id="logosRow"><div id="logosTrack"></div></div>
    </div>



    <script>
        const TOTAL_TIME = 150; // 2 minutos y 30 segundos
        const END_DISPLAY_TIME = 30; // Mostrar 0:00 durante 30 segundos

        let timeRemaining = TOTAL_TIME;
        let isRunning = false;
        let timerInterval = null;
        let endingPhase = false;
        let timerStartedAt = null; // Fecha real de inicio de la ronda
        let countdownInterval = null; // Intervalo para actualizar el countdown previo al inicio

        function startCountdownRefresh() {
            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                if (!isRunning && !endingPhase) refreshPanel();
            }, 30000);
        }

        function stopCountdownRefresh() {
            if (countdownInterval) {
                clearInterval(countdownInterval);
                countdownInterval = null;
            }
        }

        // Elementos del DOM
        const positionOverlay = document.getElementById('positionOverlay');
        const timerDisplay = document.getElementById('timer');

        // Canal de comunicación entre ventanas
        const channel = new BroadcastChannel('fll-timer-channel');

        // Cargar configuraciones
        function loadSettings() {
            return {
                announce2min: localStorage.getItem('announce2min') !== 'false', // por defecto true
                announce1min: localStorage.getItem('announce1min') !== 'false',
                announce30sec: localStorage.getItem('announce30sec') !== 'false',
                announce10sec: localStorage.getItem('announce10sec') !== 'false',
                showLogos: localStorage.getItem('showLogos') !== 'false',
                showBackground: localStorage.getItem('showBackground') !== 'false',
                closeAfter30sec: localStorage.getItem('closeAfter30sec') === 'true',
                colorBackground: localStorage.getItem('colorBackground') || '#000000',
                colorReady: localStorage.getItem('colorReady') || '#ffff00',
                colorNormal: localStorage.getItem('colorNormal') || '#00ff00',
                color30sec: localStorage.getItem('color30sec') || '#ff8800',
                color10sec: localStorage.getItem('color10sec') || '#ff0000',
                fontType: localStorage.getItem('fontType') || 'normal',
                backgroundImagePath: localStorage.getItem('backgroundImagePath') || 'Fondo_temporada.png',
                logosArray: (() => { try { const s = localStorage.getItem('logosArray'); return s ? JSON.parse(s) : null; } catch(e) { return null; } })() || ['isoy-tr-brgh-768x178.png', 'first_age_fll_unearthed_white.png', 'FIRSTLego-SPAIN-logo-small_white.png'],
                logosMarquee: localStorage.getItem('logosMarquee') !== 'false',
                logosBgColor: localStorage.getItem('logosBgColor') || '#000000',
                logosBgOpacity: parseFloat(localStorage.getItem('logosBgOpacity') || '70') / 100,
                logosStripHeight: parseInt(localStorage.getItem('logosStripHeight') || '20') || 20,
                timerPositionY: parseInt(localStorage.getItem('timerPositionY') || '50'),
                timerWidth: parseInt(localStorage.getItem('timerWidth') || '90'),
                timerBgColor: localStorage.getItem('timerBgColor') || '#000000',
                timerBgOpacity: parseFloat(localStorage.getItem('timerBgOpacity') || '0') / 100,
                timerBgPadding: parseInt(localStorage.getItem('timerBgPadding') || '0'),
                timerStrokeColor: localStorage.getItem('timerStrokeColor') || '#000000',
                timerStrokeWidth: parseInt(localStorage.getItem('timerStrokeWidth') || '0'),
                textsStrokeColor: localStorage.getItem('textsStrokeColor') || '#000000',
                textsStrokeWidth: parseInt(localStorage.getItem('textsStrokeWidth') || '0'),
                partidasPanelHeight: parseInt(localStorage.getItem('partidasPanelHeight') || '15'),
                partidasBgColor: localStorage.getItem('partidasBgColor') || '#000000',
                partidasBgOpacity: parseFloat(localStorage.getItem('partidasBgOpacity') || '65') / 100,
                chromaShow: localStorage.getItem('chromaShow') === 'true',
                chromaColor: localStorage.getItem('chromaColor') || '#00ff00',
                chromaPosition: localStorage.getItem('chromaPosition') || 'center',
                announceTextSize: parseInt(localStorage.getItem('announceTextSize') || '10'),
                announceTextColor: localStorage.getItem('announceTextColor') || '#ffffff',
                announceTextTop: parseInt(localStorage.getItem('announceTextTop') || '50'),
                announceTextOffsetX: parseInt(localStorage.getItem('announceTextOffsetX') || '0'),
                announceMaxWidth: parseInt(localStorage.getItem('announceMaxWidth') || '90'),
                announceStrokeColor: localStorage.getItem('announceStrokeColor') || '#000000',
                announceStrokeWidth: parseInt(localStorage.getItem('announceStrokeWidth') || '12'),
                timerPositionX: parseInt(localStorage.getItem('timerPositionX') || '50'),
                logosOrientation: localStorage.getItem('logosOrientation') || 'horizontal',
                logosVerticalWidth: parseInt(localStorage.getItem('logosVerticalWidth') || '10'),
                stateColors: [
                    { bg: localStorage.getItem('stateColor0') || '#3c3c3c', text: localStorage.getItem('stateTextColor0') || '#cccccc' },
                    { bg: localStorage.getItem('stateColor1') || '#e6b400', text: localStorage.getItem('stateTextColor1') || '#000000' },
                    { bg: localStorage.getItem('stateColor2') || '#dc6400', text: localStorage.getItem('stateTextColor2') || '#ffffff' },
                    { bg: localStorage.getItem('stateColor3') || '#0aaa28', text: localStorage.getItem('stateTextColor3') || '#ffffff' },
                    { bg: localStorage.getItem('stateColor4') || '#0a50d2', text: localStorage.getItem('stateTextColor4') || '#ffffff' },
                    { bg: localStorage.getItem('stateColor5') || '#d21400', text: localStorage.getItem('stateTextColor5') || '#ffffff' },
                ]
            };
        }

        // Aplicar imágenes de los logos (marquee rotativo)
        function applyLogoImages() {
            const settings = loadSettings();
            const track = document.getElementById('logosTrack');
            if (!track) return;
            const timestamp = new Date().getTime();
            const validLogos = settings.logosArray.filter(p => p && p.trim());
            if (validLogos.length === 0) return;
            // Generar los slots duplicados para el bucle continuo
            const slotsHtml = validLogos.map((path, idx) =>
                `<div class="logo-slot"><img src="${path.trim()}?t=${timestamp}" alt="Logo ${idx + 1}" draggable="false"></div>`
            ).join('');
            if (settings.logosMarquee) {
                // Duplicamos el conjunto para que el scroll sea infinito
                track.innerHTML = slotsHtml + slotsHtml;
                // Velocidad: ~80px/s. Se calcula tras cargar imágenes para tener ancho real.
                requestAnimationFrame(() => {
                    const totalW = track.scrollWidth / 2; // la mitad porque está duplicado
                    const speedPxPerSec = 80;
                    const duration = totalW / speedPxPerSec;
                    track.style.animation = `logos-marquee ${duration.toFixed(1)}s linear infinite`;
                });
            } else {
                // Estático: mostrar logos repartidos sin animación
                track.innerHTML = slotsHtml;
                track.style.animation = 'none';
                track.style.justifyContent = 'space-around';
                track.style.width = '100%';
            }
            track.querySelectorAll('img').forEach(img => img.addEventListener('click', handleLogoClick));
            updateLogosClickableState();
        }

        // Aplicar visibilidad de logos
        function applyLogosVisibility() {
            const settings = loadSettings();
            const strip = document.getElementById('logosStrip');
            const vStrip = document.getElementById('logosVerticalStrip');
            if (strip) {
                // Only show horizontal strip when orientation is horizontal
                strip.style.display = (settings.showLogos && settings.logosOrientation !== 'vertical') ? 'block' : 'none';
            }
            if (vStrip) {
                vStrip.style.display = (settings.showLogos && settings.logosOrientation === 'vertical') ? 'flex' : 'none';
            }
            applyTimerPosition();
        }

        // Aplicar panel chroma
        function applyChromaPanel() {
            const settings = loadSettings();
            const panel = document.getElementById('chromaPanel');
            if (!panel) return;

            if (!settings.chromaShow) {
                panel.style.display = 'none';
                return;
            }

            panel.style.display = 'block';
            panel.style.backgroundColor = settings.chromaColor;

            // Calculate available area between esp32Panel and logosStrip
            const esp32 = document.getElementById('esp32Panel');
            const logos = document.getElementById('logosStrip');

            const topOffset = esp32 ? esp32.offsetHeight : 0;
            const bottomOffset = (logos && logos.style.display !== 'none' && settings.showLogos) ? logos.offsetHeight : 0;
            const availH = window.innerHeight - topOffset - bottomOffset;
            const availW = window.innerWidth;

            // 16:9 aspect ratio fit within available space
            let panelW, panelH;
            if (availW / availH > 16 / 9) {
                // Height is the constraint
                panelH = availH;
                panelW = Math.round(panelH * 16 / 9);
            } else {
                // Width is the constraint
                panelW = availW;
                panelH = Math.round(panelW * 9 / 16);
            }

            panel.style.width = panelW + 'px';
            panel.style.height = panelH + 'px';
            panel.style.top = topOffset + 'px';

            // Position based on setting
            if (settings.chromaPosition === 'left') {
                panel.style.left = '0px';
            } else if (settings.chromaPosition === 'right') {
                panel.style.left = (availW - panelW) + 'px';
            } else {
                // center
                panel.style.left = Math.round((availW - panelW) / 2) + 'px';
            }
        }

        // Anuncio de equipo en pantalla
        let currentAnnounceTeam = null;
        let currentAnnounceMesa = null;

        const ANNOUNCE_ANIMATIONS = [
            'announce-fadeIn',
            'announce-zoomIn',
            'announce-zoomOut',
            'announce-slideLeft',
            'announce-slideRight',
            'announce-bounce',
            'announce-flipX',
            'announce-dropIn',
            'announce-rotateIn',
            'announce-slideUp',
            'announce-elastic',
            'announce-flipY',
            'announce-expandH'
        ];

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let announceAnimQueue = shuffleArray([...ANNOUNCE_ANIMATIONS]);

        // Anima la salida del texto de anuncio hacia su slot en el panel.
        // Llama a onDone al terminar (o inmediatamente si no hay animación posible).
        function animateAnnounceExit(onDone) {
            const overlay = document.getElementById('teamAnnounceOverlay');
            const wrapper = document.getElementById('timerWrapper');
            const textEl = overlay.querySelector('.announce-text');
            const dismissedTeam = currentAnnounceTeam;

            if (textEl && dismissedTeam) {
                const slots = document.querySelectorAll('#esp32Panel .panel-slot-mesa');
                let targetEl = null;
                slots.forEach(slot => {
                    const teamDiv = slot.querySelector('.slot-team');
                    if (teamDiv && teamDiv.textContent.trim() === dismissedTeam.trim()) {
                        targetEl = teamDiv;
                    }
                });

                if (targetEl) {
                    const srcRect = textEl.getBoundingClientRect();
                    const dstRect = targetEl.getBoundingClientRect();

                    const scaleX = dstRect.width / (srcRect.width || 1);
                    const scaleY = dstRect.height / (srcRect.height || 1);
                    const scale = Math.min(scaleX, scaleY, 1);

                    const srcCX = srcRect.left + srcRect.width / 2;
                    const srcCY = srcRect.top + srcRect.height / 2;
                    const dstCX = dstRect.left + dstRect.width / 2;
                    const dstCY = dstRect.top + dstRect.height / 2;
                    const dx = dstCX - srcCX;
                    const dy = dstCY - srcCY;

                    textEl.style.animation = 'none';
                    textEl.style.position = 'fixed';
                    textEl.style.left = srcRect.left + 'px';
                    textEl.style.top = srcRect.top + 'px';
                    textEl.style.width = srcRect.width + 'px';
                    textEl.style.height = srcRect.height + 'px';
                    textEl.style.padding = '0';
                    textEl.style.transform = 'translate(0, 0) scale(1)';
                    textEl.style.transition = 'transform 0.8s ease-in-out, opacity 0.8s ease-in-out';
                    textEl.style.transformOrigin = 'center center';

                    void textEl.offsetWidth;

                    textEl.style.transform = `translate(${dx}px, ${dy}px) scale(${scale.toFixed(4)})`;
                    textEl.style.opacity = '0.3';

                    let done = false;
                    const finish = () => {
                        if (done) return;
                        done = true;
                        overlay.style.display = 'none';
                        overlay.innerHTML = '';
                        if (onDone) onDone();
                    };
                    textEl.addEventListener('transitionend', finish, { once: true });
                    setTimeout(finish, 900);
                    return;
                }
            }

            // Fallback: sin animación
            overlay.style.display = 'none';
            overlay.innerHTML = '';
            if (onDone) onDone();
        }

        function showTeamAnnounce(teamName, mesaName) {
            const overlay = document.getElementById('teamAnnounceOverlay');
            const wrapper = document.getElementById('timerWrapper');
            const settings = loadSettings();

            currentAnnounceTeam = teamName;
            currentAnnounceMesa = mesaName || null;

            if (wrapper) wrapper.style.visibility = 'hidden';

            overlay.style.display = 'block';
            overlay.innerHTML = '';
            const text = document.createElement('div');
            text.className = 'announce-text';
            if (mesaName) {
                const mesaSpan = document.createElement('span');
                mesaSpan.className = 'announce-mesa';
                mesaSpan.textContent = mesaName;
                text.appendChild(mesaSpan);
            }
            const teamSpan = document.createElement('span');
            teamSpan.textContent = teamName;
            text.appendChild(teamSpan);

            text.style.fontSize = settings.announceTextSize + 'vw';
            text.style.color = settings.announceTextColor;
            text.style.webkitTextStroke = (settings.announceStrokeWidth / 100).toFixed(2) + 'em ' + settings.announceStrokeColor;
            text.style.top = (100 - settings.announceTextTop) + '%';
            text.style.transform = 'translateY(-50%)';
            const maxW = settings.announceMaxWidth;
            const pad = (100 - maxW) / 2;
            const offsetVw = settings.announceTextOffsetX;
            text.style.paddingLeft = 'calc(' + pad + 'vw + ' + offsetVw + 'vw)';
            text.style.paddingRight = 'calc(' + pad + 'vw - ' + offsetVw + 'vw)';
            overlay.appendChild(text);

            const anim = announceAnimQueue.shift();
            if (announceAnimQueue.length === 0) announceAnimQueue.push(...shuffleArray([...ANNOUNCE_ANIMATIONS]));
            text.style.animation = anim + ' 1.4s ease-out forwards';

            // Idle animation sequencer — starts after entry animation finishes
            const IDLE_ANIMS = [
                { name: 'idle-breathe',     dur: '3.5s' },
                { name: 'idle-fade',        dur: '3s'   },
                { name: 'idle-float',       dur: '3.2s' },
                { name: 'idle-sway',        dur: '4s'   },
                { name: 'idle-squish',      dur: '3s'   },
                { name: 'idle-glow',        dur: '3.2s' },
                { name: 'idle-letterspace', dur: '3.5s' },
            ];
            let lastIdleIdx = -1;
            function runNextIdle() {
                if (!text.isConnected) return;
                let idx;
                do { idx = Math.floor(Math.random() * IDLE_ANIMS.length); } while (idx === lastIdleIdx);
                lastIdleIdx = idx;
                const a = IDLE_ANIMS[idx];
                text.style.animation = a.name + ' ' + a.dur + ' ease-in-out 1';
                text.addEventListener('animationend', runNextIdle, { once: true });
            }
            text.addEventListener('animationend', runNextIdle, { once: true });
        }

        function applyTeamAnnounce(teamName, mesaName) {
            const overlay = document.getElementById('teamAnnounceOverlay');
            const wrapper = document.getElementById('timerWrapper');

            if (!teamName) {
                // Limpiar: animar salida y restaurar temporizador
                animateAnnounceExit(() => {
                    if (wrapper) wrapper.style.visibility = '';
                });
                currentAnnounceTeam = null;
                currentAnnounceMesa = null;
                return;
            }

            // Si hay un equipo ya anunciado, animar su salida antes de mostrar el nuevo
            if (currentAnnounceTeam && currentAnnounceTeam !== teamName) {
                animateAnnounceExit(() => {
                    showTeamAnnounce(teamName, mesaName);
                });
                return;
            }

            // Primer anuncio o re-aplicación del mismo equipo (settings-changed)
            showTeamAnnounce(teamName, mesaName);
        }

        // Aplicar tamaño y estilo de franja de logotipos
        function applyLogosStrip() {
            const settings = loadSettings();
            const strip = document.getElementById('logosStrip');
            const bgLayer = document.getElementById('logosBgLayer');
            if (!strip || !bgLayer) return;
            strip.style.height = settings.logosStripHeight + 'vh';
            bgLayer.style.backgroundColor = settings.logosBgColor;
            bgLayer.style.opacity = settings.logosBgOpacity;

        // Aplicar logos en modo vertical
        function applyLogosVerticalStrip() {
            const settings = loadSettings();
            const vStrip = document.getElementById('logosVerticalStrip');
            const hStrip = document.getElementById('logosStrip');
            if (!vStrip) return;

            if (!settings.showLogos || settings.logosOrientation !== 'vertical') {
                vStrip.style.display = 'none';
                return;
            }

            // Calculate vertical extent: below esp32Panel, full height above logosStrip (which is hidden in vertical mode)
            const esp32 = document.getElementById('esp32Panel');
            const topOffset = esp32 ? esp32.offsetHeight : 0;
            const availH = window.innerHeight - topOffset;

            // Width: if chroma active, fill space left by chroma; else use configured %
            let widthPx;
            const chromaPanel = document.getElementById('chromaPanel');
            if (settings.chromaShow && chromaPanel && chromaPanel.style.display !== 'none') {
                const chromaLeft = parseFloat(chromaPanel.style.left) || 0;
                widthPx = chromaLeft; // space to the left of chroma
                if (widthPx <= 0) widthPx = Math.round(window.innerWidth * settings.logosVerticalWidth / 100);
            } else {
                widthPx = Math.round(window.innerWidth * settings.logosVerticalWidth / 100);
            }

            vStrip.style.display = 'flex';
            vStrip.style.top = topOffset + 'px';
            vStrip.style.height = availH + 'px';
            vStrip.style.width = widthPx + 'px';

            const vbg = document.getElementById('logosVerticalBgLayer');
            if (vbg) {
                vbg.style.backgroundColor = settings.logosBgColor;
                vbg.style.opacity = settings.logosBgOpacity;
            }

            // Render logos vertically
            const track = document.getElementById('logosVerticalTrack');
            if (!track) return;
            const timestamp = new Date().getTime();
            const validLogos = settings.logosArray.filter(p => p && p.trim());
            if (validLogos.length === 0) { track.innerHTML = ''; return; }
            track.innerHTML = validLogos.map((path, idx) =>
                `<div class="logo-slot-v"><img src="${path.trim()}?t=${timestamp}" alt="Logo ${idx + 1}" draggable="false"></div>`
            ).join('');
        }

        // Aplicar posición y tamaño del temporizador
        function applyTimerPosition() {
            const settings = loadSettings();
            const wrapper = document.getElementById('timerWrapper');
            const bgLayer = document.getElementById('timerBgLayer');
            if (!wrapper) return;
            // timerPositionY: 0=temporizador centrado en la parte inferior, 100=centrado en la parte superior
            const topPct = 100 - settings.timerPositionY; // 0%→100vh (abajo), 100%→0vh (arriba)
            const leftPct = settings.timerPositionX; // 0%=izda, 100%=dcha
            const widthVw = settings.timerWidth;
            const pad = settings.timerBgPadding;

            wrapper.style.width = 'auto';
            wrapper.style.top = topPct + 'vh';
            wrapper.style.left = leftPct + 'vw';

            timerDisplay.style.fontSize = (widthVw * 0.356) + 'vw';

            const roundInfoPanel = document.getElementById('roundInfoPanel');
            if (roundInfoPanel) {
                roundInfoPanel.style.fontSize = (widthVw * 0.06) + 'vw';

        // Aplicar visibilidad de imagen de fondo
        function applyBackgroundVisibility() {

            const timestamp = new Date().getTime();
            // Forzar el cambio eliminando primero y luego aplicando
            document.body.style.backgroundImage = 'none';

        function applyBackgroundColor() {

        // Aplicar estilo de fuente según configuración
        function applyFontStyle() {
            const settings = loadSettings();
            const fontType = settings.fontType;
            
            // Resetear todos los estilos primero
            timerDisplay.style.fontStyle = 'normal';
            timerDisplay.style.textShadow = 'none';
            timerDisplay.style.transform = 'none';
            timerDisplay.style.webkitTextStroke = '';
            timerDisplay.style.filter = 'none';
            timerDisplay.style.background = 'none';
            timerDisplay.style.webkitBackgroundClip = '';
            timerDisplay.style.webkitTextFillColor = '';
            
            if (fontType === 'rock') {

                    wrapper.style.paintOrder = 'stroke fill';

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            const settings = loadSettings();
            timerDisplay.textContent = formatTime(timeRemaining);
            
            // Agregar o quitar animación de oscilación durante la fase final
            const timerWrapper = document.getElementById('timerWrapper');
            if (endingPhase) {
                if (timerWrapper) timerWrapper.classList.add('ending');
            } else {
                if (timerWrapper) timerWrapper.classList.remove('ending');
            }
            
            // Determinar color según el tiempo restante
            let currentColor;
            if (endingPhase) {
                currentColor = settings.color10sec;
            } else if (timeRemaining <= 10 && isRunning) {
                currentColor = settings.color10sec;
            } else if (timeRemaining <= 30 && isRunning) {
                currentColor = settings.color30sec;
            } else if (isRunning) {
                currentColor = settings.colorNormal;
            } else {
                currentColor = settings.colorNormal;
            }
            timerDisplay.style.color = currentColor;

            // Sincronizar color de ronda/hora con el temporizador
            const roundInfoPanel = document.getElementById('roundInfoPanel');
            if (roundInfoPanel) {
                roundInfoPanel.querySelectorAll('.round-line:not([data-diff])').forEach(el => {
                    el.style.color = '#cccccc';
                });
            }
        }

        function startTimer() {
            isRunning = true;
            applyTeamAnnounce(null);
            timerStartedAt = new Date();
            timerDisplay.classList.remove('ready');
            stopCountdownRefresh();
            refreshPanel();

            // Notificar a la ventana de control que el timer ha iniciado
            channel.postMessage({ type: 'timer-started' });
            
            let Played1m = false;
            let Played2m = false;
            let Played10 = false;
            let Played9 = false;
            let Played8 = false;
            let Played7 = false;
            let Played6 = false;
            let Played5 = false;
            let Played4 = false;
            let Played3 = false;
            let Played2 = false;
            let Played1 = false;
            let Played30 = false;
            
            // Enviar señal para reproducir el sonido de inicio
            channel.postMessage({ type: 'play-sound', sound: 'charger' });

            timerInterval = setInterval(() => {
                // Cargar configuraciones en cada tick para aplicar cambios en tiempo real
                const settings = loadSettings();
                
                timeRemaining--;
                updateDisplay();

                // Enviar actualización del tiempo a control.html
                channel.postMessage({ 
                    type: 'timer-tick', 
                    timeRemaining: timeRemaining 
                });

                if (timeRemaining === 30 && !Played30 && settings.announce30sec) {
                    Played30 = true;
                    channel.postMessage({ type: 'play-sound', sound: '30sec' });
                }
                if (settings.announce10sec) {
                    if (timeRemaining === 10 && !Played10) {
                        Played10 = true;
                        channel.postMessage({ type: 'play-sound', sound: '10' });
                    }
                    if (timeRemaining === 9 && !Played9) {
                        Played9 = true;
                        channel.postMessage({ type: 'play-sound', sound: '9' });
                    }
                    if (timeRemaining === 8 && !Played8) {
                        Played8 = true;
                        channel.postMessage({ type: 'play-sound', sound: '8' });
                    }
                    if (timeRemaining === 7 && !Played7) {
                        Played7 = true;
                        channel.postMessage({ type: 'play-sound', sound: '7' });
                    }
                    if (timeRemaining === 6 && !Played6) {
                        Played6 = true;
                        channel.postMessage({ type: 'play-sound', sound: '6' });
                    }
                    if (timeRemaining === 5 && !Played5) {
                        Played5 = true;
                        channel.postMessage({ type: 'play-sound', sound: '5' });
                    }
                    if (timeRemaining === 4 && !Played4) {
                        Played4 = true;
                        channel.postMessage({ type: 'play-sound', sound: '4' });
                    }
                    if (timeRemaining === 3 && !Played3) {
                        Played3 = true;
                        channel.postMessage({ type: 'play-sound', sound: '3' });
                    }
                    if (timeRemaining === 2 && !Played2) {
                        Played2 = true;
                        channel.postMessage({ type: 'play-sound', sound: '2' });
                    }
                    if (timeRemaining === 1 && !Played1) {
                        Played1 = true;
                        channel.postMessage({ type: 'play-sound', sound: '1' });
                    }
                }
                if (timeRemaining === 60 && !Played1m && settings.announce1min) {
                    Played1m = true;
                    channel.postMessage({ type: 'play-sound', sound: '1min' });
                }
                if (timeRemaining === 120 && !Played2m && settings.announce2min) {
                    Played2m = true;
                    channel.postMessage({ type: 'play-sound', sound: '2min' });
                }

                if (timeRemaining <= 0) {
                    endTimer();
                }
            }, 1000);
        }

        function endTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeRemaining = 0;
            endingPhase = true;
            updateDisplay();

            // Enviar señal para reproducir el buzzer
            channel.postMessage({ type: 'play-sound', sound: 'buzzer' });

            // Notificar fin de tiempo a index.html para que envíe FIN a ESP32
            channel.postMessage({ type: 'timer-ended' });
            
            // Countdown de los 30 segundos de espera
            let remainingEndTime = END_DISPLAY_TIME;
            
            // Notificar inicio de espera
            channel.postMessage({ 
                type: 'status-update', 
                message: `⏰ ¡Tiempo terminado! Esperando ${remainingEndTime} segundos...` 
            });

            // Intervalo para actualizar el countdown cada segundo
            const endCountdownInterval = setInterval(() => {
                remainingEndTime--;
                if (remainingEndTime > 0) {
                    channel.postMessage({ 
                        type: 'status-update', 
                        message: `⏳ Finalizando en ${remainingEndTime} segundos...` 
                    });
                } else {
                    clearInterval(endCountdownInterval);
                }
            }, 1000);

            setTimeout(() => {
                clearInterval(endCountdownInterval);
                resetTimer();
                
                // Cerrar la ventana si está habilitada la opción
                const settings = loadSettings();
                if (settings.closeAfter30sec) {
                    window.close();
                }
            }, END_DISPLAY_TIME * 1000);
        }

        function resetTimer() {
            timeRemaining = TOTAL_TIME;
            endingPhase = false;
            timerStartedAt = null;
            updateDisplay();
            updateLogosClickableState();
            refreshPanel();
            startCountdownRefresh();
            
            // Notificar reset
            channel.postMessage({ 
                type: 'status-update', 
                message: '🔄 Temporizador finalizado y reseteado' 
            });
            
            // Notificar a la ventana de control que el timer se ha reseteado
            // La ventana se cerrará desde el panel de control
            channel.postMessage({ type: 'timer-reset' });
        }

        // Escuchar mensajes del panel de control
        channel.addEventListener('message', (event) => {
            const { type } = event.data;
            
            if (type === 'prepare-timer') {
                const settings = loadSettings();
                timeRemaining = TOTAL_TIME;
                updateDisplay();
            } else if (type === 'start-timer') {
                startTimer();
                updateLogosClickableState();
            } else if (type === 'reset-timer') {
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                isRunning = false;
                timeRemaining = TOTAL_TIME;
                timerStartedAt = null;
                applyTeamAnnounce(null);
                updateDisplay();
                updateLogosClickableState();
                refreshPanel();
                startCountdownRefresh();
            } else if (type === 'settings-changed') {
                // Las configuraciones han cambiado - aplicar nuevos estilos
                applyBackgroundColor();
                applyBackgroundVisibility();
                applyLogosStrip();
                applyLogosVisibility();
                applyLogoImages();
                applyTimerPosition();
                applyFontStyle();
                applyChromaPanel();
                applyLogosVerticalStrip();
                updateDisplay();
                updatePanelHeight();
                
                // Actualizar estilo del anuncio de equipo si está activo
                if (currentAnnounceTeam) {
                    applyTeamAnnounce(currentAnnounceTeam, currentAnnounceMesa);
                }
                
                // Verificar si se debe mostrar u ocultar el overlay según la configuración
                const settings = loadSettings();
                if (settings.closeAfter30sec && !hasStoredPosition()) {
                    showPositionOverlay();
                } else {
                    hidePositionOverlay();
                }
                
                channel.postMessage({ 
                    type: 'status-update', 
                    message: '⚙️ Configuraciones actualizadas' 
                });
            } else if (type === 'save-position') {
                // Guardar la posición y tamaño actuales de la ventana
                // Usar innerWidth/innerHeight para que coincida exactamente al abrir
                localStorage.setItem('windowLeft', window.screenX.toString());
                localStorage.setItem('windowTop', window.screenY.toString());
                localStorage.setItem('windowWidth', (window.innerWidth-10).toString());
                localStorage.setItem('windowHeight', (window.innerHeight-19).toString());
                
                // Ocultar el overlay
                hidePositionOverlay();
                
                // Confirmar que se guardó la posición
                channel.postMessage({ type: 'position-saved' });
                
                // Cerrar la ventana solo si la opción está activada
                const settingsSave = loadSettings();
                if (settingsSave.closeAfter30sec) {
                    //window.close();
                }
            } else if (type === 'forget-position') {
                // Mostrar el overlay solo si la opción de cerrar está activada
                const settings = loadSettings();
                if (settings.closeAfter30sec) {
                    showPositionOverlay();
                }
            } else if (type === 'led-status') {
                lastLedStatus = event.data;
                ledConnected = event.data.connected;
                if (event.data.selfId) ledSelfId = event.data.selfId;
                if (ledConnected && event.data.nodes) {
                    const online = event.data.nodes.filter(n => n.online);
                    const hasPreparacion = online.some(n => n.state === 1 || n.state === 2);
                    const hasReady = online.some(n => n.state === 3);
                    const anyPartida = online.some(n => n.state === 4);
                    ledCanStart = event.data.isMaster !== false && !hasPreparacion && hasReady && !anyPartida;
                    const masterNode = ledSelfId ? online.find(n => n.id === ledSelfId) : null;
                    ledMasterIsReady = masterNode ? masterNode.state === 3 : false;
                } else {
                    ledCanStart = false;
                    ledMasterIsReady = false;
                }
                renderEsp32Panel(event.data.nodes, event.data.connected, ledSelfId);
                updateTimerReadyDisplay();
                updateLogosClickableState();
            } else if (type === 'team-announce') {
                applyTeamAnnounce(event.data.teamName, event.data.mesaName);
            } else if (type === 'team-announce-clear') {
                applyTeamAnnounce(null);
            }
        });

        let ledConnected = false;
        let ledCanStart = false;
        let ledMasterIsReady = false;
        let ledSelfId = null; // ID del nodo maestro (USB)
        let lastLedStatus = null;

        function refreshPanel() {
            const d = lastLedStatus;
            renderEsp32Panel(d ? d.nodes : null, d ? d.connected : false, ledSelfId);
        }

        setTimeout(() => { renderEsp32Panel(null, false, null); applyChromaPanel(); applyLogosVerticalStrip(); }, 0); // mostrar equipos de partida activa aunque no haya LEDs

        window.addEventListener('storage', (e) => {
            if (e.key === 'mesaHeaders' || e.key === 'partidasData') {
                const d = lastLedStatus;
                renderEsp32Panel(d ? d.nodes : null, d ? d.connected : false, ledSelfId);
            }
        });

        const ESP32_STATE_NAMES = {
            1: 'PREPARACION',
            2: 'PREPARANDO',
            3: 'READY',
            4: 'PARTIDA',
            5: 'FIN'
        };

        // Muestra -:-- cuando el LED maestro está conectado pero no en READY, y el timer está parado
        function updateTimerReadyDisplay() {
            if (isRunning || endingPhase) return;
            const settings = loadSettings();
            if (ledConnected && !ledMasterIsReady) {
                timerDisplay.textContent = '';
                timerDisplay.style.color = settings.colorReady;
            } else {
                timerDisplay.textContent = formatTime(timeRemaining);
                timerDisplay.style.color = settings.colorNormal;
            }
        }

        function updatePanelHeight() {
            const panel = document.getElementById('esp32Panel');
            if (!panel || panel.style.display === 'none') return;
            const settings = loadSettings();
            panel.style.height = settings.partidasPanelHeight + 'vh';
            const hex = settings.partidasBgColor;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            panel.style.background = `rgba(${r},${g},${b},${settings.partidasBgOpacity})`;
            fitPanelText();
        }

        window.addEventListener('resize', updatePanelHeight);

        // Recalcular la altura del panel cuando el layout cambie (p.ej. al cargar imágenes de logos)
        if (window.ResizeObserver) {
            const layoutObserver = new ResizeObserver(() => {
                updatePanelHeight();
            });
            const container = document.getElementById('container');
            if (container) layoutObserver.observe(container);
        }

        function renderEsp32Panel(nodes, connected, selfId) {
            const panel = document.getElementById('esp32Panel');
            if (!panel) return;
            const settings = loadSettings();
            const stateColors = settings.stateColors;

            let nodeConfig = [];
            try { nodeConfig = JSON.parse(localStorage.getItem('esp32NodeConfig') || '[]'); } catch {}

            let mesaHeaders = [];
            let activePartida = null;
            try {
                mesaHeaders = JSON.parse(localStorage.getItem('mesaHeaders') || '[]');
                const partidasData = JSON.parse(localStorage.getItem('partidasData') || '[]');
                activePartida = partidasData.find(p => p.activa) || null;
            } catch {}

            // ---- Modo con partidas: la fuente de verdad son las mesas ----
            if (activePartida && mesaHeaders.length) {
                // Construir un mapa displayName -> nodo
                const nodeMap = {};
                if (connected && nodes) {
                    for (const n of nodes) {
                        if (!n.online) continue;
                        const cfg = nodeConfig.find(c => c.id === n.id);
                        const displayName = (cfg && cfg.name) ? cfg.name : n.id;
                        nodeMap[displayName.trim().toLowerCase()] = n;
                    }
                }

                // Una tarjeta por mesa que tenga equipo
                const cards = [];
                for (let i = 0; i < mesaHeaders.length; i++) {
                    const header = mesaHeaders[i];
                    const teamName = (activePartida.mesas[i] || '').trim();
                    if (!teamName) continue; // sin equipo → no mostrar

                    const node = nodeMap[header.trim().toLowerCase()] || null;
                    // Si el nodo es el maestro, mostrar de todas formas pero sin estado LED
                    const isSelf = node && node.id === selfId;

                    // Estado: si no hay nodo, es el maestro, o está desconectado → estado 0
                    const state = (node && !isSelf && node.state !== undefined) ? node.state : 0;

                    cards.push({ header, teamName, state });
                }

                if (cards.length === 0) {
                    panel.style.display = 'none';
                    panel.style.height = '';
                    panel.innerHTML = '';
                    const rip = document.getElementById('roundInfoPanel');
                    if (rip) { rip.style.display = 'none'; rip.innerHTML = ''; }
                    return;
                }

// Render round info into the roundInfoPanel (inside timerWrapper)
                const roundInfoPanel = document.getElementById('roundInfoPanel');
                const rondaLabel = activePartida.ronda || '';
                if (roundInfoPanel) {
                    if (rondaLabel || activePartida.hora) {
                        let diffText = '', diffColor = '#ccc';
                        if (activePartida.hora) {
                            if (timerStartedAt) {
                                const [hh, mm] = activePartida.hora.split(':').map(Number);
                                const scheduled = new Date(timerStartedAt);
                                scheduled.setHours(hh, mm, 0, 0);
                                const diffMs = timerStartedAt - scheduled;
                                const diffMin = Math.round(diffMs / 60000);
                                diffText = diffMin === 0 ? 'En hora' : (diffMin > 0 ? `+${diffMin}\u2032` : `${diffMin}\u2032`);
                                diffColor = diffMin <= 0 ? settings.colorNormal : settings.color10sec;
                            } else {
                                const now = new Date();
                                const [hh, mm] = activePartida.hora.split(':').map(Number);
                                const scheduled = new Date(now);
                                scheduled.setHours(hh, mm, 0, 0);
                                const diffMs = scheduled - now;
                                const diffMin = Math.round(Math.abs(diffMs) / 60000);
                                diffColor = diffMs >= 0 ? settings.colorNormal : settings.color10sec;
                                diffText = diffMs >= 0 ? (diffMin === 0 ? '\u00a1Ahora!' : `en ${diffMin}\u2032`) : `${diffMin}\u2032`;
                            }
                        }
                        // Use current timer color for ronda/hora text
                        const timerColor = timerDisplay.style.color || settings.colorNormal;
                        const lines = [];
                        if (rondaLabel) lines.push(`<div class="round-line" style="color:#cccccc;">${rondaLabel}</div>`);
                        if (activePartida.hora) lines.push(`<div class="round-line" style="color:#cccccc;">${activePartida.hora}</div>`);
                        if (diffText) lines.push(`<div class="round-line" data-diff="1" style="color:${diffColor};font-weight:bold;">${diffText}</div>`);
                        roundInfoPanel.innerHTML = lines.join('');
                        roundInfoPanel.style.display = 'flex';
                    } else {
                        roundInfoPanel.innerHTML = '';
                        roundInfoPanel.style.display = 'none';
                    }
                }

                panel.innerHTML = cards.map(c => {
                    const sc = stateColors[c.state];
                    const bgStyle = sc ? `background:${sc.bg};color:${sc.text};` : '';
                    return `<div class="panel-slot panel-slot-mesa st-${c.state}" style="${bgStyle}">
                    <div class="slot-header">${c.header}</div>
                    <div class="slot-body"><div class="slot-team">${c.teamName}</div></div>
                </div>`;
                }).join('');
                panel.style.display = 'flex';
                updatePanelHeight();
                fitPanelText();
                return;
            }

            // ---- Modo sin partidas: mostrar nodos no-reposo (conducta original) ----
            // Hide round info panel when no partidas
            const ripNoPartida = document.getElementById('roundInfoPanel');
            if (ripNoPartida) { ripNoPartida.style.display = 'none'; ripNoPartida.innerHTML = ''; }

            if (!connected || !nodes || nodes.length === 0) {
                panel.style.display = 'none';
                panel.style.height = '';
                panel.innerHTML = '';
                return;
            }

            const visible = nodes.filter(n => n.online && n.state !== 0 && n.id !== selfId);

            if (visible.length === 0) {
                panel.style.display = 'none';
                panel.style.height = '';
                panel.innerHTML = '';
                return;
            }

            const enriched = visible.map(n => {
                const cfg = nodeConfig.find(c => c.id === n.id);
                return {
                    ...n,
                    displayName: (cfg && cfg.name) ? cfg.name : n.id,
                    order: (cfg && cfg.order != null) ? cfg.order : 9999
                };
            }).sort((a, b) => a.order - b.order);

            panel.innerHTML = enriched.map(n => {
                const label = ESP32_STATE_NAMES[n.state] || n.displayName;
                const sc = stateColors[n.state];
                const bgStyle = sc ? `background:${sc.bg};color:${sc.text};` : '';
                return `<div class="panel-slot panel-slot-mesa st-${n.state}" style="${bgStyle}">
                    <div class="slot-header">${n.displayName}</div>
                    <div class="slot-body"><div class="slot-team">${label}</div></div>
                </div>`;
            }).join('');
            panel.style.display = 'flex';
            updatePanelHeight();
            fitPanelText();
        }

        // Ajusta el texto de cada slot:
        // - .slot-header: tamaño uniforme igual en todos los slots (25% altura del panel)
        // - .slot-team: tamaño máximo que quepa en el ancho del slot y la altura disponible
        function fitPanelText() {
            const panel = document.getElementById('esp32Panel');
            if (!panel || panel.style.display === 'none') return;
            const panelH = panel.offsetHeight;

            // 1. Cabeceras: mismo tamaño en todos los slots basado en 25% del panel
            const headerH = panelH * 0.25;
            const headerSize = Math.max(6, Math.floor(headerH * 0.65));
            panel.querySelectorAll('.slot-header').forEach(h => {
                h.style.fontSize = headerSize + 'px';
            });

            // 2. Nombres de equipo y texto de ronda: por slot, tamaño que quepa en ancho y en altura del body
            panel.querySelectorAll('.slot-team').forEach(team => {
                const slot = team.closest('.panel-slot');
                const slotW = (slot ? slot.clientWidth : panel.clientWidth / panel.querySelectorAll('.panel-slot').length) - 12;
                // Altura disponible: si el slot tiene header, 75% del panel; si no (ronda), 100%
                const hasHeader = slot && slot.querySelector('.slot-header');
                const availH = hasHeader ? panelH * 0.75 : panelH * 0.96;
                // El texto de equipo/ronda puede ocupar hasta 3 líneas
                const maxByH = Math.max(6, Math.floor((availH / 3) * 0.95));
                let fs = Math.min(maxByH, 120);
                team.style.fontSize = fs + 'px';
                // Reducir hasta que quepa en ancho y alto
                while (fs > 6 && (team.scrollWidth > slotW || team.scrollHeight > availH)) {
                    fs--;
                    team.style.fontSize = fs + 'px';
                }
            });
        }

        // Funciones para el overlay de posición
        function hasStoredPosition() {
            return localStorage.getItem('windowLeft') !== null;
        }

        function showPositionOverlay() {
            if (positionOverlay) {
                positionOverlay.classList.remove('hidden');
            }
        }

        function hidePositionOverlay() {
            if (positionOverlay) {
                positionOverlay.classList.add('hidden');
            }
        }

        // Evento de click en el overlay para guardar la posición
        if (positionOverlay) {
            positionOverlay.addEventListener('click', function() {
                // Guardar la posición y tamaño actuales de la ventana
                localStorage.setItem('windowLeft', window.screenX.toString());
                localStorage.setItem('windowTop', window.screenY.toString());
                localStorage.setItem('windowWidth', (window.innerWidth-10).toString());
                localStorage.setItem('windowHeight', (window.innerHeight-19).toString());
                
                // Ocultar el overlay
                hidePositionOverlay();
                
                // Confirmar que se guardó la posición
                channel.postMessage({ type: 'position-saved' });
                
                // Cerrar la ventana solo si la opción está activada
                const settingsClick = loadSettings();
                if (settingsClick.closeAfter30sec) {
                    //window.close();
                }
            });
        }

        // Función para actualizar el estado clickeable de los logos
        function updateLogosClickableState() {
            const timerReady = !isRunning && timeRemaining === TOTAL_TIME && !endingPhase;
            const canStart = timerReady && (!ledConnected || ledCanStart);
            const row = document.getElementById('logosRow');
            if (row) {
                row.querySelectorAll('img').forEach(img => {
                    if (canStart) {
                        img.classList.remove('disabled');
                    } else {
                        img.classList.add('disabled');
                    }
                });
            }
        }

        // Event listeners para iniciar el timer al hacer click en los logos
        function handleLogoClick() {
            // Solo iniciar si el temporizador está sin iniciar
            if (!isRunning && timeRemaining === TOTAL_TIME && !endingPhase) {
                // Si hay ESP32 conectado, respetar la condición canStart
                if (ledConnected && !ledCanStart) return;
                startTimer();
                // Si hay ESP32 conectado, enviar PARTIDA
                if (ledConnected) {
                    channel.postMessage({ type: 'led-start' });
                }
                updateLogosClickableState();
            }
        }

        // Inicializar estilos y display
        applyBackgroundColor();
        applyBackgroundVisibility();
        applyLogosStrip();
        applyLogosVisibility();
        applyLogoImages();
        applyTimerPosition();
        applyFontStyle();
        applyChromaPanel();
        applyLogosVerticalStrip();
        updateDisplay();
        updateLogosClickableState();

        // Verificar si hay posición guardada y mostrar/ocultar overlay
        // Solo mostrar overlay si la opción de cerrar tras 30 seg está activada
        const settings = loadSettings();
        if (settings.closeAfter30sec && !hasStoredPosition()) {
            showPositionOverlay();
        } else {
            hidePositionOverlay();
        }

        // Iniciar el refresco periódico del countdown previo al inicio
        startCountdownRefresh();

        // Recalcular chroma panel al cambiar tamaño de ventana
        window.addEventListener('resize', () => {
            applyChromaPanel();
            applyLogosVerticalStrip();
        });
    </script>
</body>
</html>
